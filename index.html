<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Hamdalat ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            overflow: hidden;
            position: relative;
        }

        /* Floating background hearts */
        .bg-heart {
            position: absolute;
            color: rgba(255, 143, 171, 0.4);
            font-size: 24px;
            animation: float Up 6s linear infinite;
            bottom: -50px;
            zIndex: 1;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(251, 111, 146, 0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 2px solid #ffb3c6;
            animation: fadeIn 1s ease-in-out;
            position: relative;
            z-index: 10;
        }

        .heart-icon {
            font-size: 4rem;
            color: #ff477e;
            margin-bottom: 1rem;
            animation: heartbeat 1.2s infinite;
        }

        h1 {
            color: #ff0a54;
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            line-height: 1.3;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 2rem;
            position: relative;
            height: 50px;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background-color: #ff477e;
            color: white;
        }

        #yesBtn:hover {
            background-color: #ff0a54;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 10, 84, 0.4);
        }

        #noBtn {
            background-color: #f8f9fa;
            color: #6c757d;
            position: absolute;
            right: 60px;
        }

        /* Success State Styling */
        .success-message {
            display: none;
            animation: scaleUp 0.5s forwards;
        }

        .success-message h2 {
            color: #ff0a54;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .success-message p {
            color: #495057;
            font-size: 1.1rem;
        }

        /* Animations */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.15); }
            40% { transform: scale(1); }
            60% { transform: scale(1.15); }
            80% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainCard">
        <div class="card-content" id="proposalInterface">
            <div class="heart-icon">❤️</div>
            <h1>Hamdalat, Please Be My Girlfriend</h1>
            <div class="buttons">
                <button class="btn" id="yesBtn">Yes!</button>
                <button class="btn" id="noBtn">No</button>
            </div>
        </div>

        <div class="success-message" id="successResponse">
            <div class="heart-icon">💖✨</div>
            <h2>Yay! alignment perfect! 🥰</h2>
            <p>You just made my day! I promise to make you smile every single day.</p>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const proposalInterface = document.getElementById('proposalInterface');
        const successResponse = document.getElementById('successResponse');

        // Function to move the "No" button away playfully
        function moveNoButton() {
            // Calculate random positions within the container's bounds
            const container = document.getElementById('mainCard');
            const padding = 20;
            
            const maxX = container.clientWidth - noBtn.clientWidth - padding;
            const maxY = container.clientHeight - noBtn.clientHeight - padding;
            
            // Random X and Y positions
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            // Apply new absolute position styles
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Trigger the movement on both hover (desktop) and touch (mobile)
        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents accidental clicking on mobile
            moveNoButton();
        });

        // Handle the "Yes" button click
        yesBtn.addEventListener('click', () => {
            proposalInterface.style.display = 'none';
            successResponse.style.display = 'block';
            createCelebrationHearts();
        });

        // Decorative: Background floating hearts creation
        function createBgHeart() {
            const heart = document.createElement('div');
            heart.classList.add('bg-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's'; // 3-6s
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        // Keep generating soft background hearts
        setInterval(createBgHeart, 800);

        // Extra burst of hearts when she clicks YES
        function createCelebrationHearts() {
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('bg-heart');
                    heart.innerHTML = ['💖','💝','❤️','💕'][Math.floor(Math.random()*4)];
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                    document.body.appendChild(heart);
                }, i * 50);
            }
        }
    </script>
</body>
</html>
