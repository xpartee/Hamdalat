<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Linking our external CSS file -->

</head>
<body>

    <!-- Your live Formspree endpoint is wired up here -->

        <input type="text" name="Proposal Answer" id="formAnswer" value="">
    </form>

    <div class="container" id="mainCard">
        <!-- The Main Interface -->
        <div class="card-content" id="proposalInterface">
            <div class="heart-icon">❤️</div>

        <!-- The Success Screen -->
        <div class="success-message" id="successResponse">
            <div class="heart-icon">💖✨</div>
            <h2>Yay! Perfect Alignment! 🥰</h2>
            <p>You just made my day! Check your phone, I'm probably smiling like crazy right now.</p>

    </div>
